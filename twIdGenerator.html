<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份證/居留證產生器</title>
    <style>
        #divPasteBoard {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            min-height: 100px;
        }
        .controls-container {
            border:1px solid black;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .gender-container {
            /*border:1px solid yellow;*/
            display: grid;
            grid-template-columns: auto auto;
            justify-content: center;
            row-gap: 10px;
            column-gap: 6px;
         
            width:25%;
        }
        .notice-container {
            /*border:1px solid red;*/
            display: flex;
            align-items: center; /* Vertical center */
            justify-content: center; /* Horizontal left */
            width:25%
        }
        .button-container {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .location-container{
            /*border:1px solid blue;*/
            width:50%
        }
        #locationContainer {
            display: grid;
            grid-template-columns: repeat(6, auto);
            justify-content: center;
            row-gap: 10px;
            column-gap: 12px;
        }
        .location-cell {
            display: flex;
            align-items: center;
            gap: 4px;
            min-height: 22px;
        }

        #divPasteBoard .row {
            line-height: 40px;
        }

        .StickerLabel {
            color:white;
            margin: 5px;
            padding: 5px;
            cursor: pointer;
        }

        .BtnOff {
            background-color: #5bc0de;
        }
        .BtnOff:hover {
            background-color: #43a5c6;
        }        

        .BtnOn {
            background-color: #5cb85c;
        }
        .BtnOn:hover {
            background-color: #449d44;
        }
        
        .dateStyle {
            color:blue;
        }
    </style>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script type="text/javascript">
    $(function () {
        //瀏覽器不支援剪貼薄
        if (navigator.clipboard == undefined) alert("您的瀏覽器不支援剪貼薄，請改更Chrome或更新版瀏覽器");

        let cssBtnOff = "StickerLabel BtnOff";
        let cssBtnOn = "StickerLabel BtnOn";

        // 身份證字號
        const locationTw =
            [[10, "A", "臺北市"],
            [11, "B", "臺中市"],
            [12, "C", "基隆市"],
            [13, "D", "臺南市"],
            [14, "E", "高雄市"],
            [15, "F", "臺北縣"],
            [16, "G", "宜蘭縣"],
            [17, "H", "桃園縣"],
            [34, "I", "嘉義市"],
            [18, "J", "新竹縣"],
            [19, "K", "苗栗縣"],
            [20, "L", "臺中縣"],
            [21, "M", "南投縣"],
            [22, "N", "彰化縣"],
            [35, "O", "新竹市"],
            [23, "P", "雲林縣"],
            [24, "Q", "嘉義縣"],
            [25, "R", "臺南縣"],
            [26, "S", "高雄縣"],
            [27, "T", "屏東縣"],
            [28, "U", "花蓮縣"],
            [29, "V", "臺東縣"],
            [32, "W", "金門縣"],
            [30, "X", "澎湖縣"],
            [31, "Y", "陽明山"],
            [33, "Z", "連江縣"]];
        
        initPasteBoard()
        
        //取得居留證號
        //location:A~Z
        //gender:1,男 2,女
        function getResidentId(location = "A",gender =  1){
          // 權重
          const weights = [1, 9, 8, 7, 6, 5, 4, 3, 2, 1, 1]
          let locationNumber = locationTw.find(item => item[1] === location)[0];
          let num0 = Math.trunc(locationNumber / 10);
          let num1 = locationNumber % 10;
          let num2 = gender === 1 ? 8 : 9;
          let num3 = Math.floor(Math.random() * 6);
          let num4 = Math.floor(Math.random() * 9);
          let num5 = Math.floor(Math.random() * 9);
          let num6 = Math.floor(Math.random() * 9);
          let num7 = Math.floor(Math.random() * 9);
          let num8 = Math.floor(Math.random() * 9);
          let num9 = Math.floor(Math.random() * 9);
          let num10 = (num0 * weights[0] + 
                    num1 * weights[1] +
                    num2 * weights[2] +
                    num3 * weights[3] +
                    num4 * weights[4] +
                    num5 * weights[5] +
                    num6 * weights[6] +
                    num7 * weights[7] +
                    num8 * weights[8] +
                    num9 * weights[9]) % 10;
          if (num10 !== 0) num10 = 10 - num10;

          return location + num2 + num3 + num4 + num5 + num6 + num7 + num8 + num9 + num10
        }

        function validateResidentId(id){
          let idArray = id.split(''); 
          let locationNumber = locationTw.find(item => item[1] === idArray[0])[0]
          let chr0 = Math.ceil(locationNumber / 10)
          let chr1 = locationNumber % 10
          idArray.splice(0,1,chr0,chr1)

          let sum = 0;
          for(let i = 0 ; i < idArray.length ; i++ ){
            sum += parseInt(idArray[i]) * weights[i]
          }

          return sum % 10 === 0;
        }


        //取得身份證號
        //location:A~Z
        //gender:1,男 2,女
        function getTwId(location, gender){
            var locationRdn = locationTw.find(item => item[1] === location);
            var szSN = "";
            var location = locationRdn[0],
                szLocation = locationRdn[1],
                num = 1;

            for (let i = 0; i < num; i++) {
                var validateCode = ((location - location % 10) / 10) +
                    (location % 10 * 9) +
                    gender * 8;
                var tmpSN = szLocation + gender;
                for (var j = 1; j <= 7; j++) {
                    var ran = (Math.random() * 10).toString().charAt(0);
                    validateCode += parseInt(ran) * (8 - j);
                    tmpSN += ran;
                }
                szSN += tmpSN + (10 - validateCode % 10) % 10 + "\n";
            }

            szSN = szSN.substring(0, szSN.length - 1);
            return szSN;
        }

        //取得統一編號
        function getCompanyId(){
          const weights = [1, 2, 1, 2, 1, 2, 4, 1]
          let result = []
          let sum = 0
          for(let i = 0 ; i < (weights.length - 1) ; i++){
            let tmp = Math.floor(Math.random() * 10)
            //第七碼是七
            let no7is7 = i === 6 && tmp === 7
            result.push(tmp)

            //權重計算
            let right = tmp * weights[i]
            //十位數加個位數
            right = Math.floor(right / 10) + (right % 10)
            if (no7is7) right += 1

            sum += right
          }
          sum = sum % 5
          if (sum !== 0) sum = 5 - sum;
          result.push(sum)

          return result.join('');
        }

        //init PasteBoard
        function initPasteBoard()
        {
            let textIdHistory = window.localStorage.getItem('idHistory') || '[]';
            let idHistory = JSON.parse(textIdHistory)
            
            $('#divPasteBoard').empty()
            for(let i = 0 ; i < idHistory.length ; i++)
                setPasteBoard(idHistory[i], false)
        }

        //set PasteBoard
        function setPasteBoard(objId, btnOn = true)
        {
            let cssBtn = btnOn ? cssBtnOn : cssBtnOff
            //回復上一個按鈕的顏色
            if (btnOn) $(".BtnOn").eq(0).prop({ class: cssBtnOff });
            let createDate = new Date(objId.createDate)
            createDate = `${createDate.getFullYear()}/${String(createDate.getMonth() + 1).padStart(2, '0')}/${String(createDate.getDate()).padStart(2, '0')} ${String(createDate.getHours()).padStart(2, '0')}:${String(createDate.getMinutes()).padStart(2, '0')}:${String(createDate.getSeconds()).padStart(2, '0')}`
            let divPasteBoard = $('#divPasteBoard')
            let row = $(document.createElement('div')).prop({ class: "row" })
            let frm = $(document.createElement('div')).prop({ class: "col-md-12 col-sm-12 col-xs-12" })
            let lbl = $(document.createElement('span')).prop({ innerHTML: objId.id, class: cssBtn, title: createDate });
            let lblDate = $(document.createElement('span')).prop({ innerHTML: createDate, class: 'dateStyle' });
            frm.append(lbl)
            frm.append(lblDate)
            row.append(frm)
            divPasteBoard.prepend(row)
        }

        function save(objId)
        {
            let idHistory = JSON.parse(window.localStorage.getItem('idHistory') || '[]')
            idHistory.push(objId)
            window.localStorage.setItem('idHistory',JSON.stringify(idHistory))
        }

        function copy(id)
        {
            navigator.clipboard.writeText(id);
            $("#lblNotice").text("已複製 : " + id);
        }

        //id按扭事件
        $('#divPasteBoard').on('click', '.BtnOff, .BtnOn', function(){
            let btnId = $(this);
            copy(btnId.text())
            //回復上一個按鈕的顏色
            $(".BtnOn").eq(0).prop({ class: cssBtnOff });
            //標示目前按鈕的顏色
            btnId.prop({ class: cssBtnOn });
        });

        $('#btnTwId').on("click", () => {
            const locationSelect = $('input[name="location"]:checked');
            const genderSelect = $('input[name="gender"]:checked');
            if (locationSelect.length && genderSelect.length) {
                const id = getTwId(locationSelect.val(), parseInt(genderSelect.val()))
                const objId = { id: id, createDate: new Date().toISOString() }
                save(objId)
                copy(id)
                setPasteBoard(objId)
            }
        });

        $('#btnResidentId').on('click', () => {
            const locationSelect = $('input[name="location"]:checked');
            const genderSelect = $('input[name="gender"]:checked');
            if (locationSelect.length && genderSelect.length) {
                const id = getResidentId(locationSelect.val(), parseInt(genderSelect.val()))
                const objId = { id: id, createDate: new Date().toISOString() }
                save(objId)
                copy(id)
                setPasteBoard(objId)
            }
        });

        $('#btnCompanyId').on('click', () => {
            const id = getCompanyId()
            const objId = { id: id, createDate: new Date().toISOString() }
            save(objId)
            copy(id)
            setPasteBoard(objId)
        });

        $('#btnEmpty').on('click', () => {
            $('#divPasteBoard').empty()
            window.localStorage.setItem('idHistory', '[]')
        });

        // Populate location radio buttons
        const locationContainer = $('#locationContainer');
        let locationIndex = 0;
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j < 6; j++) {
                const cell = document.createElement('div');
                cell.className = 'location-cell';
                if (locationIndex < locationTw.length) {
                    const location = locationTw[locationIndex];
                    const radioId = `loc-${location[1]}`;
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.id = radioId;
                    radio.name = 'location';
                    radio.value = location[1];
                    if (locationIndex === 0) {
                        radio.checked = true;
                    }

                    const label = document.createElement('label');
                    label.htmlFor = radioId;
                    label.textContent = `${location[2]}(${location[1]})`;

                    cell.appendChild(radio);
                    cell.appendChild(label);
                    locationIndex++;
                }
                locationContainer.append(cell);
            }
        }
    })
    </script>
</head>
<body>
    <div class="controls-container">
        <div class="gender-container">
          <input type="radio" id="male" name="gender" value="1" checked>
          <label for="male">男</label>
          <input type="radio" id="female" name="gender" value="2">
          <label for="female">女</label>
        </div>
        <div class="location-container">
          <div id="locationContainer"></div>
        </div>
        <div class="notice-container">
          <label id="lblNotice" style="font-size:medium;margin-left:10px;"></label>
        </div>
    </div>

    <div class="button-container">
        <button class="btn btn-primary" id="btnTwId">台灣身份證</button>
        <button class="btn btn-primary" id="btnResidentId">新式居留證</button>
        <button class="btn btn-primary" id="btnCompanyId">統一編號</button>
        <button class="btn btn-primary" id="btnEmpty">清空</button>
    </div>

    <div id="divPasteBoard"></div>
</body>
</html>
