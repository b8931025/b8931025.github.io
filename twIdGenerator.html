<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份證/居留證產生器</title>
    <style>
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            min-height: 100px;
        }
        .controls-container {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .gender-container {
            margin-right: 80px;
        }
        .notice-container {
            display: flex;
            align-items: center; /* Vertical center */
            justify-content: flex-start; /* Horizontal left */
            width: 400px;
        }
        .button-container {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
	  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script type="text/javascript">
    $(function () {
        const twIdBtn = document.getElementById('twId');
        const newIdBtn = document.getElementById('newId');
        const companyId = document.getElementById('companyId');
        const resultDiv = document.getElementById('result');
        
        // 權重
        const weights = [1, 9, 8, 7, 6, 5, 4, 3, 2, 1, 1]
        // 身份證字號
        const locationTw =
            [[10, "A", "臺北市"],
            [11, "B", "臺中市"],
            [12, "C", "基隆市"],
            [13, "D", "臺南市"],
            [14, "E", "高雄市"],
            [15, "F", "臺北縣"],
            [16, "G", "宜蘭縣"],
            [17, "H", "桃園縣"],
            [34, "I", "嘉義市"],
            [18, "J", "新竹縣"],
            [19, "K", "苗栗縣"],
            [20, "L", "臺中縣"],
            [21, "M", "南投縣"],
            [22, "N", "彰化縣"],
            [35, "O", "新竹市"],
            [23, "P", "雲林縣"],
            [24, "Q", "嘉義縣"],
            [25, "R", "臺南縣"],
            [26, "S", "高雄縣"],
            [27, "T", "屏東縣"],
            [28, "U", "花蓮縣"],
            [29, "V", "臺東縣"],
            [32, "W", "金門縣"],
            [30, "X", "澎湖縣"],
            [31, "Y", "陽明山"],
            [33, "Z", "連江縣"]];

        //location:A~Z
        //gender:1,男 2,女
        function getResidentId(location = "A",gender =  1){
          let locationNumber = locationTw.find(item => item[1] === location)[0];
          let num0 = Math.ceil(locationNumber / 10);
          let num1 = locationNumber % 10;
          let num2 = gender === 1 ? 8 : 9;
          let num3 = Math.floor(Math.random() * 6);
          let num4 = Math.floor(Math.random() * 9);
          let num5 = Math.floor(Math.random() * 9);
          let num6 = Math.floor(Math.random() * 9);
          let num7 = Math.floor(Math.random() * 9);
          let num8 = Math.floor(Math.random() * 9);
          let num9 = Math.floor(Math.random() * 9);
          let num10 = (num0 * weights[0] + 
                    num1 * weights[1] +
                    num2 * weights[2] +
                    num3 * weights[3] +
                    num4 * weights[4] +
                    num5 * weights[5] +
                    num6 * weights[6] +
                    num7 * weights[7] +
                    num8 * weights[8] +
                    num9 * weights[9]) % 10;
          if (num10 !== 0) num10 = 10 - num10;

          return location + num2 + num3 + num4 + num5 + num6 + num7 + num8 + num9 + num10
        }

        function validateResidentId(id){
          let idArray = id.split(''); 
          let locationNumber = locationTw.find(item => item[1] === idArray[0])[0]
          let chr0 = Math.ceil(locationNumber / 10)
          let chr1 = locationNumber % 10
          idArray.splice(0,1,chr0,chr1)

          let sum = 0;
          for(let i = 0 ; i < idArray.length ; i++ ){
            sum += parseInt(idArray[i]) * weights[i]
          }

          return sum % 10 === 0;
        }


        //取得新身份證號
        //location:A~Z
        //gender:1,男 2,女
        function getTwId(location, gender){
            var locationRdn = locationTw.find(item => item[1] === location);
            var szSN = "";
            var location = locationRdn[0],
                szLocation = locationRdn[1],
                num = 1;

            for (let i = 0; i < num; i++) {
                var validateCode = ((location - location % 10) / 10) +
                    (location % 10 * 9) +
                    gender * 8;
                var tmpSN = szLocation + gender;
                for (var j = 1; j <= 7; j++) {
                    var ran = (Math.random() * 10).toString().charAt(0);
                    validateCode += parseInt(ran) * (8 - j);
                    tmpSN += ran;
                }
                szSN += tmpSN + (10 - validateCode % 10) % 10 + "\n";
            }

            szSN = szSN.substring(0, szSN.length - 1);
            return szSN;
        }

        function getCompanyId(){
          const weights = [1, 2, 1, 2, 1, 2, 4, 1]
          let result = []
          let sum = 0
          for(let i = 0 ; i < (weights.length - 1) ; i++){
            let tmp = 0
            if (i === 0){
              tmp = Math.ceil(Math.random() * 9) + 1
            }else{
              tmp = Math.ceil(Math.random() * 10)
            }
            sum += tmp * weights[i]
            result.push(tmp)
          }
          sum = sum % 10
          if (sum !== 0) sum = 10 - sum;
          result.push(sum)

          return result.join('');
        }
        
        function generateId(isNew) {
            let id = '';
            // 1. First char: A-Z
            id += letters.charAt(Math.floor(Math.random() * letters.length));

            if (isNew) {
                // 2. Second char: 8 or 9
                id += Math.random() < 0.5 ? '8' : '9';
            } else {
                // 2. Second char: A-D
                const secondLetters = 'ABCD';
                id += secondLetters.charAt(Math.floor(Math.random() * secondLetters.length));
            }

            // 3. Remaining 8 digits
            for (let i = 0; i < 8; i++) {
                id += Math.floor(Math.random() * 10);
            }
            return id;
        }

        function verifyId(id) {
            id = id.trim();
            
            verification = id.match("^[A-Z][ABCD]\\d{8}$")
            if(!verification){
              return false
            }

            let conver = "ABCDEFGHJKLMNPQRSTUVXYWZIO"
            let weights = [1, 9, 8, 7, 6, 5, 4, 3, 2, 1, 1]

            id = String(conver.indexOf(id[0]) + 10) +  String((conver.indexOf(id[1]) + 10)%10) + id.slice(2);

            checkSum = 0
            for (let i = 0; i < id.length; i++) {
                c = parseInt(id[i])
                w = weights[i]
                checkSum += c * w
            }
          
            return checkSum % 10 == 0
        }

        twIdBtn.addEventListener('click', () => {
            const locationSelect = document.querySelector('input[name="location"]:checked');
            const genderSelect = document.querySelector('input[name="gender"]:checked');
            if (locationSelect && genderSelect) {
              resultDiv.textContent = getTwId(locationSelect.value, parseInt(genderSelect.value));
              navigator.clipboard.writeText(resultDiv.textContent);
              $("#lblNotice").text("已複製 : " + resultDiv.textContent);
            }
        });

        newIdBtn.addEventListener('click', () => {
            const locationSelect = document.querySelector('input[name="location"]:checked');
            const genderSelect = document.querySelector('input[name="gender"]:checked');
            if (locationSelect && genderSelect) {
              resultDiv.textContent = getResidentId(locationSelect.value, parseInt(genderSelect.value));
              navigator.clipboard.writeText(resultDiv.textContent);
              $("#lblNotice").text("已複製 : " + resultDiv.textContent);
            }
        });

        companyId.addEventListener('click', () => {
          resultDiv.textContent = getCompanyId();
          navigator.clipboard.writeText(resultDiv.textContent);
          $("#lblNotice").text("已複製 : " + resultDiv.textContent);
        });

        document.getElementById('verifyBtn').addEventListener('click', () => {
            const idToVerify = resultDiv.textContent;
            const isValid = validateResidentId(idToVerify);
            alert('驗證結果: ' + (isValid ? '正確' : '錯誤'));
        });

        // Populate location radio buttons
        const locationContainer = document.getElementById('locationContainer');
        const table = document.createElement('table');
        let locationIndex = 0;
        for (let i = 0; i < 5; i++) {
            const row = document.createElement('tr');
            for (let j = 0; j < 6; j++) {
                const cell = document.createElement('td');
                if (locationIndex < locationTw.length) {
                    const location = locationTw[locationIndex];
                    const radioId = `loc-${location[1]}`;
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.id = radioId;
                    radio.name = 'location';
                    radio.value = location[1];
                    if (locationIndex === 0) {
                        radio.checked = true;
                    }

                    const label = document.createElement('label');
                    label.htmlFor = radioId;
                    label.textContent = `${location[2]}(${location[1]})`;

                    cell.appendChild(radio);
                    cell.appendChild(label);
                    locationIndex++;
                }
                row.appendChild(cell);
            }
            table.appendChild(row);
        }
        locationContainer.appendChild(table);
    })
    </script>
</head>
<body>
    <div class="controls-container">
        <div class="notice-container">
          <label id="lblNotice" style="font-size:medium;margin-left:10px;"></label>
        </div>
        <div class="gender-container">
          <input type="radio" id="male" name="gender" value="1" checked>
          <label for="male">男</label>
          <br>
          <input type="radio" id="female" name="gender" value="2">
          <label for="female">女</label>
        </div>
        <div id="locationContainer"></div>
    </div>

    <div class="button-container">
        <button id="twId">台灣身份證</button>
        <button id="newId">新式居留證</button>
        <button id="companyId">統一編號</button>
        <button id="verifyBtn">驗證</button>
    </div>

    <div id="result"></div>
</body>
</html>
